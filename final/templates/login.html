{% extends "base.html" %}
{% block title %}Sign In — JHD Hotel{% endblock %}
{% block content %}
<div style="background:linear-gradient(135deg,var(--rose),var(--lavender));min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
<div style="background:var(--white);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow-lg);">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2rem;margin-bottom:.5rem;">🌸</div>
    <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:300;">Welcome Back</h1>
    <p style="color:var(--text-soft);font-size:.9rem;">Sign in with your email</p>
  </div>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group"><label>Email Address</label><input type="email" name="email" required placeholder="your@email.com" autofocus></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
  </form>
  <p style="text-align:center;margin-top:1.5rem;font-size:.88rem;color:var(--text-soft);">
    New guest? <a href="{{ url_for('register') }}" style="color:var(--rose-deep);">Register here</a>
  </p>
</div>
</div>
{% endblock %}
