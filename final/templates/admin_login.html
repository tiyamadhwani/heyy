{% extends "base.html" %}
{% block title %}Admin Login — JHD Hotel{% endblock %}
{% block content %}
<div style="background:linear-gradient(135deg,var(--rose),var(--lavender));min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
<div style="background:var(--white);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--shadow-lg);">
  <div style="text-align:center;margin-bottom:2rem;"><div style="font-size:2rem;margin-bottom:.5rem;">🔐</div>
  <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:300;">Admin Login</h1></div>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Login</button>
  </form>
</div></div>
{% endblock %}
