services:
  - type: web
    name: jhd-hotel
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: NORMAL_PRICE
        value: "4000"
      - key: PEAK_PRICE
        value: "7000"
      - key: SUPER_DELUXE_EXTRA
        value: "1500"
      - key: PEAK_SEASON_RANGES
        value: "10-01:12-31,01-01:03-31"
      - key: PAYPAL_MODE
        value: live
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
