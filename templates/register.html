{% extends "base.html" %}
{% block title %}Register — JHD Hotel{% endblock %}
{% block content %}
<div style="background:linear-gradient(135deg,var(--rose),var(--lavender));min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
<div style="background:var(--white);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:480px;box-shadow:var(--shadow-lg);">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2rem;margin-bottom:.5rem;">🌸</div>
    <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:300;">Create Account</h1>
  </div>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group"><label>First Name *</label><input type="text" name="first_name" required></div>
      <div class="form-group"><label>Last Name *</label><input type="text" name="last_name" required></div>
    </div>
    <div class="form-group"><label>Email *</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Phone</label><input type="tel" name="phone" placeholder="+91 8619882284"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
  </form>
  <p style="text-align:center;margin-top:1.5rem;font-size:.88rem;color:var(--text-soft);">
    Already registered? <a href="{{ url_for('login') }}" style="color:var(--rose-deep);">Sign in</a>
  </p>
</div>
</div>
{% endblock %}
